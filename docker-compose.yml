services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: file-management-app
    volumes:
      - .:/var/www
    depends_on:
      - mysql
      - redis
    networks:
      - file-management

  nginx:
    image: nginx:stable-alpine
    container_name: file-management-nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - file-management
  mysql:
    image: mysql:8.0
    container_name: file-management-mysql
    environment:
      MYSQL_DATABASE: file_management_service
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - file-management

  redis:
    image: redis:7-alpine
    container_name: file-management-redis
    ports:
      - "6379:6379"
    networks:
      - file-management
 
 
  minio:
    image: minio/minio:latest
    container_name: file-management-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - file-management
  
  mailpit:
    image: axllent/mailpit:latest
    container_name: file-management-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - file-management

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: file-management-meilisearch
    environment:
      MEILI_MASTER_KEY: masterKey
    ports:
      - "7700:7700"
    volumes:
      - meilisearch-data:/meili_data
    networks:
      - file-management
  
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: file-management-reverb
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - .:/var/www
    ports:
      - "8080:8080"
    depends_on:
      - app
    networks:
      - file-management

networks:
  file-management:
    driver: bridge

volumes:
  mysql-data:
  minio-data:
  meilisearch-data:

